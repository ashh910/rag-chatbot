<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Chatbot</title>

    <style>
        body{
            font-family: Arial;
            width:700px;
            margin:40px auto;
        }

        #chat{
            height:400px;
            border:1px solid gray;
            overflow-y:auto;
            padding:10px;
            margin-bottom:10px;
        }

        input{
            width:80%;
            padding:10px;
        }

        button{
            padding:10px 20px;
        }

        .user{
            color:blue;
        }

        .assistant{
            color:green;
        }
    </style>
</head>
<body>

<h2>My Chatbot</h2>

<div id="chat"></div>

<input id="message" type="text" placeholder="Type a message...">
<button onclick="send()">Send</button>

<script>

async function send(){

    const input = document.getElementById("message");
    const text = input.value.trim();

    if(text === "")
        return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `<p class="user"><b>You:</b> ${text}</p>`;

    input.value = "";

    const response = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:text
        })
    });

    const data = await response.json();

    chat.innerHTML += `<p class="assistant"><b>Assistant:</b> ${data.reply}</p>`;

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("message")
.addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        send();
    }
});

</script>

</body>
</html>
