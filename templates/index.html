<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #14161a;
    --panel: #1a1d23;
    --panel-raised: #21252c;
    --border: #2a2e37;
    --text: #e8e6e1;
    --text-dim: #8b909c;
    --text-faint: #565b66;
    --accent-agent: #6ee7b7;
    --accent-chat: #f0b458;
    --accent-user: #a78bfa;
    --danger: #f0685c;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    overflow:hidden;
  }

  .app{
    display:flex;
    height:100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:270px;
    flex-shrink:0;
    background: var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:20px 14px;
  }

  .brand{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:0.06em;
    color: var(--text-dim);
    padding: 4px 8px 18px 8px;
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand::before{
    content:"";
    width:7px; height:7px;
    border-radius:50%;
    background: var(--accent-agent);
    box-shadow: 0 0 6px var(--accent-agent);
  }

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color: var(--text-faint);
    padding: 0 8px;
    margin-bottom:8px;
  }

  .model-list{
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .model-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 10px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .model-item:hover{
    background: var(--panel-raised);
  }
  .model-item.active{
    background: var(--panel-raised);
    border-color: var(--border);
  }

  .model-dot{
    width:7px; height:7px;
    border-radius:50%;
    flex-shrink:0;
  }
  .model-dot.agent{ background: var(--accent-agent); box-shadow:0 0 5px var(--accent-agent); }
  .model-dot.chat{ background: var(--accent-chat); box-shadow:0 0 5px var(--accent-chat); }

  .model-info{
    display:flex;
    flex-direction:column;
    gap:1px;
    min-width:0;
  }
  .model-name{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text);
    white-space:nowrap;
  }
  .model-tag{
    font-size:10.5px;
    color: var(--text-faint);
  }

  .legend{
    margin-top:auto;
    padding:10px 8px 4px 8px;
    border-top:1px solid var(--border);
    font-size:10.5px;
    color: var(--text-faint);
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .legend-row{ display:flex; align-items:center; gap:8px; }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .topbar{
    padding:16px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .topbar-title{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-dim);
  }
  .topbar-title b{ color: var(--text); }

  #chat{
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .msg{
    display:flex;
    flex-direction:column;
    gap:4px;
    max-width:640px;
  }
  .msg.user{ align-self:flex-end; align-items:flex-end; }
  .msg.assistant{ align-self:flex-start; align-items:flex-start; }

  .msg-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
  }
  .msg.user .msg-label{ color: var(--accent-user); }
  .msg.assistant .msg-label{ color: var(--accent-agent); }

  .bubble{
    padding:10px 14px;
    border-radius:10px;
    font-size:14.5px;
    line-height:1.5;
    white-space:pre-wrap;
  }
  .msg.user .bubble{
    background: var(--panel-raised);
    border:1px solid var(--border);
  }
  .msg.assistant .bubble{
    background: transparent;
    border:1px solid var(--border);
  }

  .system-note{
    align-self:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--text-faint);
    padding:4px 10px;
    border:1px dashed var(--border);
    border-radius:20px;
  }

  .composer{
    padding:16px 24px 22px 24px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
  }
  #message{
    flex:1;
    background: var(--panel);
    border:1px solid var(--border);
    color: var(--text);
    padding:12px 14px;
    border-radius:9px;
    font-size:14.5px;
    font-family:'Inter', sans-serif;
    outline:none;
  }
  #message:focus{
    border-color: var(--accent-agent);
  }
  #message::placeholder{ color: var(--text-faint); }

  button.send{
    background: var(--accent-agent);
    color:#0d1410;
    border:none;
    padding:0 22px;
    border-radius:9px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition: opacity 0.12s ease;
  }
  button.send:hover{ opacity:0.85; }
  button.send:disabled{ opacity:0.4; cursor:default; }

  .empty-state{
    margin:auto;
    text-align:center;
    color: var(--text-faint);
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:4px; }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">model console</div>

    <div class="section-label">Select model</div>
    <div class="model-list" id="model-list">
      <div class="model-item" data-model="gpt-oss" data-cap="agent">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">gpt-oss</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="gemma4" data-cap="agent">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">gemma4</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="qwen3-6" data-cap="agent">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">qwen3-6</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="alemllm" data-cap="chat">
        <span class="model-dot chat"></span>
        <span class="model-info">
          <span class="model-name">alemllm</span>
          <span class="model-tag">chat only</span>
        </span>
      </div>
      <div class="model-item" data-model="kazllm" data-cap="chat">
        <span class="model-dot chat"></span>
        <span class="model-info">
          <span class="model-name">kazllm</span>
          <span class="model-tag">chat only</span>
        </span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-row"><span class="model-dot agent"></span> supports tool calling</div>
      <div class="legend-row"><span class="model-dot chat"></span> plain chat only</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">connected to: <b id="active-model-label">gpt-oss</b></div>
    </div>

    <div id="chat">
      <div class="empty-state" id="empty-state">no messages yet — say hi</div>
    </div>

    <div class="composer">
      <input id="message" type="text" placeholder="Type a message...">
      <button class="send" type="button" onclick="send()">Send</button>
    </div>
  </main>

</div>

<script>
let currentModel = "gpt-oss";

const chat = document.getElementById("chat");
const emptyState = document.getElementById("empty-state");
const activeLabel = document.getElementById("active-model-label");
const modelItems = document.querySelectorAll(".model-item");

function setActiveModel(model){
  if(model === currentModel) return;
  currentModel = model;

  modelItems.forEach(item => {
    item.classList.toggle("active", item.dataset.model === model);
  });

  activeLabel.textContent = model;

  // clear chat on model switch
  chat.innerHTML = "";
  const note = document.createElement("div");
  note.className = "system-note";
  note.textContent = `switched to ${model} — chat cleared`;
  chat.appendChild(note);
}

modelItems.forEach(item => {
  item.addEventListener("click", () => setActiveModel(item.dataset.model));
});
// mark initial active model
document.querySelector(`.model-item[data-model="${currentModel}"]`).classList.add("active");

function appendMessage(role, text){
  if(emptyState) emptyState.remove();
  const msg = document.createElement("div");
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <span class="msg-label">${role === "user" ? "you" : "assistant"}</span>
    <div class="bubble"></div>
  `;
  msg.querySelector(".bubble").textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

async function send(){
  const input = document.getElementById("message");
  const text = input.value.trim();
  if(text === "") return;

  appendMessage("user", text);
  input.value = "";

  const thinking = appendMessage("assistant", "…");

  try{
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, model: currentModel })
    });
    const data = await response.json();
    thinking.querySelector(".bubble").textContent = data.reply;
  } catch(err){
    thinking.querySelector(".bubble").textContent = "Error: could not reach server.";
  }
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("message").addEventListener("keypress", function(event){
  if(event.key === "Enter"){
    send();
  }
});
</script>
</body>
</html>
