<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #14161a;
    --panel: #1a1d23;
    --panel-raised: #21252c;
    --border: #2a2e37;
    --text: #e8e6e1;
    --text-dim: #8b909c;
    --text-faint: #565b66;
    --accent-agent: #6ee7b7;
    --accent-user: #a78bfa;
    --danger: #f0685c;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    overflow:hidden;
  }

  .app{
    display:flex;
    height:100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:270px;
    flex-shrink:0;
    background: var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:20px 14px;
  }

  .brand{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:0.06em;
    color: var(--text-dim);
    padding: 4px 8px 18px 8px;
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand::before{
    content:"";
    width:7px; height:7px;
    border-radius:50%;
    background: var(--accent-agent);
    box-shadow: 0 0 6px var(--accent-agent);
  }

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color: var(--text-faint);
    padding: 0 8px;
    margin-bottom:8px;
  }

  .model-list{
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .model-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 10px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .model-item:hover{
    background: var(--panel-raised);
  }
  .model-item.active{
    background: var(--panel-raised);
    border-color: var(--border);
  }

  .model-dot{
    width:7px; height:7px;
    border-radius:50%;
    flex-shrink:0;
  }
  .model-dot.agent{ background: var(--accent-agent); box-shadow:0 0 5px var(--accent-agent); }

  .model-info{
    display:flex;
    flex-direction:column;
    gap:1px;
    min-width:0;
  }
  .model-name{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text);
    white-space:nowrap;
  }
  .model-tag{
    font-size:10.5px;
    color: var(--text-faint);
  }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .topbar{
    padding:16px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .topbar-title{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-dim);
  }
  .topbar-title b{ color: var(--text); }

  #chat{
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .msg{
    display:flex;
    flex-direction:column;
    gap:4px;
    max-width:640px;
  }
  .msg.user{ align-self:flex-end; align-items:flex-end; }
  .msg.assistant{ align-self:flex-start; align-items:flex-start; }

  .msg-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
  }
  .msg.user .msg-label{ color: var(--accent-user); }
  .msg.assistant .msg-label{ color: var(--accent-agent); }

  .bubble{
    padding:10px 14px;
    border-radius:10px;
    font-size:14.5px;
    line-height:1.5;
    white-space:pre-wrap;
  }
  .msg.user .bubble{
    background: var(--panel-raised);
    border:1px solid var(--border);
  }
  .msg.assistant .bubble{
    background: transparent;
    border:1px solid var(--border);
  }

  .system-note{
    align-self:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--text-faint);
    padding:4px 10px;
    border:1px dashed var(--border);
    border-radius:20px;
  }
  .system-note.accepted{ color: var(--accent-agent); border-color: var(--accent-agent); }
  .system-note.declined{ color: var(--danger); border-color: var(--danger); }

  .composer{
    padding:16px 24px 22px 24px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
  }
  #message{
    flex:1;
    background: var(--panel);
    border:1px solid var(--border);
    color: var(--text);
    padding:12px 14px;
    border-radius:9px;
    font-size:14.5px;
    font-family:'Inter', sans-serif;
    outline:none;
  }
  #message:focus{
    border-color: var(--accent-agent);
  }
  #message::placeholder{ color: var(--text-faint); }

  button.send{
    background: var(--accent-agent);
    color:#0d1410;
    border:none;
    padding:0 22px;
    border-radius:9px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition: opacity 0.12s ease;
  }
  button.send:hover{ opacity:0.85; }
  button.send:disabled{ opacity:0.4; cursor:default; }

  button.attach{
    background: var(--panel);
    color: var(--text-dim);
    border:1px solid var(--border);
    width:44px;
    flex-shrink:0;
    border-radius:9px;
    font-size:17px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  button.attach:hover{
    background: var(--panel-raised);
    color: var(--text);
    border-color: var(--accent-agent);
  }
  button.attach.has-file{
    color: var(--accent-agent);
    border-color: var(--accent-agent);
  }

  .attachment-preview{
    display:none;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    padding:0 24px 12px 24px;
  }
  .attachment-preview.visible{ display:flex; }

  .file-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--panel-raised);
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 8px 6px 12px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--text-dim);
    max-width:320px;
  }
  .file-chip .file-name{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .file-chip .file-remove{
    background:none;
    border:none;
    color: var(--text-faint);
    cursor:pointer;
    font-size:14px;
    line-height:1;
    padding:2px 4px;
    border-radius:4px;
  }
  .file-chip .file-remove:hover{
    color: var(--danger);
    background: rgba(240,104,92,0.1);
  }

  .msg-file-chip{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--text-dim);
    background: var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px 10px;
    margin-bottom:2px;
  }

  .msg-image{
    display:block;
    max-width:340px;
    width:100%;
    border-radius:10px;
    border:1px solid var(--border);
    margin-bottom:6px;
  }

  .empty-state{
    margin:auto;
    text-align:center;
    color: var(--text-faint);
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius:4px; }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">model console</div>

    <div class="section-label">Select model</div>
    <div class="model-list" id="model-list">
      <div class="model-item" data-model="gpt-oss">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">gpt-oss</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="gemma4">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">gemma4</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="qwen3-6">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">qwen3-6</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="alemllm">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">alemllm</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="kazllm">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">kazllm</span>
          <span class="model-tag">tools + RAG</span>
        </span>
      </div>
      <div class="model-item" data-model="text-to-image">
        <span class="model-dot agent"></span>
        <span class="model-info">
          <span class="model-name">text-to-image</span>
          <span class="model-tag">image generation</span>
        </span>
      </div>
    </div>

  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">connected to: <b id="active-model-label">gpt-oss</b></div>
    </div>

    <div id="chat">
      <div class="empty-state" id="empty-state">no messages yet — say hi</div>
    </div>

    <div class="attachment-preview" id="attachment-preview"></div>

    <div class="composer">
      <input id="file-input" type="file" style="display:none" multiple>
      <button class="attach" type="button" id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file(s)">📎</button>
      <input id="message" type="text" placeholder="Type a message...">
      <button class="send" type="button" onclick="send()">Send</button>
    </div>
  </main>

</div>

<script>
let currentModel = "gpt-oss";

// One message array per model, e.g. { "gpt-oss": [{role:"user", text:"hi"}, ...], ... }
// In-memory only — resets on every page refresh, matching backend restarts during dev.
let chatHistories = {};

const chat = document.getElementById("chat");
const emptyState = document.getElementById("empty-state");
const activeLabel = document.getElementById("active-model-label");
const modelItems = document.querySelectorAll(".model-item");

function getHistory(model){
  if(!chatHistories[model]) chatHistories[model] = [];
  return chatHistories[model];
}

function renderHistory(model){
  chat.innerHTML = "";
  const history = getHistory(model);

  if(history.length === 0){
    const note = document.createElement("div");
    note.className = "empty-state";
    note.id = "empty-state";
    note.textContent = "no messages yet — say hi";
    chat.appendChild(note);
    return;
  }

  history.forEach(entry => {
    if(entry.role === "system"){
      renderSystemNote(entry.text, entry.status);
    } else {
      renderMessage(entry.role, entry.text, entry.fileInfo, entry.imageInfo);
    }
  });
  chat.scrollTop = chat.scrollHeight;
}

// Small pill notification (e.g. "file.txt uploaded" / "file.txt skipped").
// status: "accepted" | "declined" | undefined (neutral)
function renderSystemNote(text, status){
  const currentEmpty = document.getElementById("empty-state");
  if(currentEmpty) currentEmpty.remove();
  const note = document.createElement("div");
  note.className = `system-note${status ? " " + status : ""}`;
  note.textContent = text;
  chat.appendChild(note);
  chat.scrollTop = chat.scrollHeight;
  return note;
}

function appendSystemNote(text, status){
  renderSystemNote(text, status);
  getHistory(currentModel).push({ role: "system", text, status });
}

function setActiveModel(model){
  if(model === currentModel) return;
  currentModel = model;

  modelItems.forEach(item => {
    item.classList.toggle("active", item.dataset.model === model);
  });

  activeLabel.textContent = model;

  const input = document.getElementById("message");
  input.placeholder = model === "text-to-image"
    ? "Describe the image you want..."
    : "Type a message...";

  // show that model's own history instead of wiping it
  renderHistory(model);
}

modelItems.forEach(item => {
  item.addEventListener("click", () => setActiveModel(item.dataset.model));
});
// mark initial active model
document.querySelector(`.model-item[data-model="${currentModel}"]`).classList.add("active");
renderHistory(currentModel);

// Fills a bubble element with (in order): image, file chips, text.
// imageInfo (optional): { src } where src is any valid <img> src
//   (a normal URL, or a data: URI for base64-returned images)
function fillBubble(bubble, text, fileInfos, imageInfo){
  bubble.innerHTML = "";

  if(imageInfo && imageInfo.src){
    const img = document.createElement("img");
    img.className = "msg-image";
    img.src = imageInfo.src;
    img.alt = text || "generated image";
    bubble.appendChild(img);
  }

  if(fileInfos && fileInfos.length){
    fileInfos.forEach(fileInfo => {
      const chip = document.createElement("div");
      chip.className = "msg-file-chip";
      chip.textContent = `📎 ${fileInfo.name}`;
      bubble.appendChild(chip);
    });
  }

  if(text){
    const textNode = document.createElement("div");
    textNode.textContent = text;
    bubble.appendChild(textNode);
  }
}

// Renders a message bubble without touching history storage (used for replay)
// fileInfos (optional): array of { name, size }
// imageInfo (optional): { src }
function renderMessage(role, text, fileInfos, imageInfo){
  const currentEmpty = document.getElementById("empty-state");
  if(currentEmpty) currentEmpty.remove();
  const msg = document.createElement("div");
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <span class="msg-label">${role === "user" ? "you" : "assistant"}</span>
    <div class="bubble"></div>
  `;

  fillBubble(msg.querySelector(".bubble"), text, fileInfos, imageInfo);

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

// Renders a message AND records it into the current model's history
function appendMessage(role, text, fileInfos, imageInfo){
  const msg = renderMessage(role, text, fileInfos, imageInfo);
  getHistory(currentModel).push({ role, text, fileInfo: fileInfos || null, imageInfo: imageInfo || null });
  return msg;
}

let isSending = false; // hard guard: makes double-fire structurally impossible
let selectedFiles = [];

const fileInput = document.getElementById("file-input");
const attachBtn = document.getElementById("attach-btn");
const attachmentPreview = document.getElementById("attachment-preview");

fileInput.addEventListener("change", function(){
  // accumulate across multiple attach clicks instead of replacing
  selectedFiles = selectedFiles.concat(Array.from(fileInput.files));
  fileInput.value = ""; // reset so picking the same file again still fires 'change'
  renderAttachmentPreview();
});

function renderAttachmentPreview(){
  attachmentPreview.innerHTML = "";

  if(selectedFiles.length === 0){
    attachmentPreview.classList.remove("visible");
    attachBtn.classList.remove("has-file");
    return;
  }

  selectedFiles.forEach((file, index) => {
    const chip = document.createElement("div");
    chip.className = "file-chip";
    chip.innerHTML = `
      <span class="file-name">${file.name}</span>
      <button class="file-remove" type="button" title="Remove file">✕</button>
    `;
    chip.querySelector(".file-remove").addEventListener("click", () => removeAttachment(index));
    attachmentPreview.appendChild(chip);
  });

  attachmentPreview.classList.add("visible");
  attachBtn.classList.add("has-file");
}

function removeAttachment(index){
  selectedFiles.splice(index, 1);
  renderAttachmentPreview();
}

function clearAttachment(){
  selectedFiles = [];
  fileInput.value = "";
  renderAttachmentPreview();
}

async function send(){
  console.log("[send] called", new Error().stack); // DEBUG — remove once confirmed fixed

  if(isSending){
    console.log("[send] blocked — a request is already in flight");
    return;
  }

  const input = document.getElementById("message");
  const text = input.value.trim();
  const files = selectedFiles;

  // require at least one of text or a file
  if(text === "" && files.length === 0) return;

  isSending = true;
  const sendBtn = document.querySelector("button.send");
  if(sendBtn) sendBtn.disabled = true;

  const activeModelAtSend = currentModel; // guard against a model switch mid-request

  const fileInfos = files.length ? files.map(f => ({ name: f.name, size: f.size })) : null;
  appendMessage("user", text, fileInfos);
  input.value = "";
  clearAttachment();

  const thinking = appendMessage("assistant", "…");

  try{
    // Always send as FormData — one simple path, whether or not files are attached.
    const formData = new FormData();
    formData.append("message", text);
    formData.append("model", activeModelAtSend);
    files.forEach(file => formData.append("files", file)); // same label "files" for every file

    const response = await fetch("/chat", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    // Show a small notification per file the backend accepted/declined.
    if(Array.isArray(data.file_status)){
      data.file_status.forEach(f => {
        const label = f.accepted ? `"${f.filename}" uploaded` : `"${f.filename}" skipped — unsupported format`;
        appendSystemNote(label, f.accepted ? "accepted" : "declined");
      });
    }

    // Backend contract for image models — we try a few common shapes so this
    // works regardless of exactly how your /chat route packages the result:
    //   { "image_base64": "iVBORw0..." }              <- raw base64, no data: prefix
    //   { "image_url": "https://..." }                 <- direct URL
    //   { "reply": "iVBORw0..." }                       <- base64 sent as "reply"
    //   { "reply": { "image_base64": "..." } }
    //   { "reply": { "url": "..." } }
    //   { "reply": { "data": [ { "b64_json": "..." } ] } }   <- raw OpenAI-style images API shape
    //   { "reply": { "data": [ { "url": "..." } ] } }
    function extractImage(data){
      const candidates = [data, data.reply];
      for(const c of candidates){
        if(!c) continue;
        if(typeof c === "string" && c.length > 100 && !c.trim().startsWith("http")){
          // long string, not a URL -> treat as raw base64
          return { src: `data:image/png;base64,${c}` };
        }
        if(typeof c === "object"){
          if(c.image_base64) return { src: `data:image/png;base64,${c.image_base64}` };
          if(c.b64_json) return { src: `data:image/png;base64,${c.b64_json}` };
          if(c.image_url) return { src: c.image_url };
          if(c.url) return { src: c.url };
          if(Array.isArray(c.data) && c.data[0]){
            if(c.data[0].b64_json) return { src: `data:image/png;base64,${c.data[0].b64_json}` };
            if(c.data[0].url) return { src: c.data[0].url };
          }
        }
      }
      return null;
    }

    const imageInfo = extractImage(data);
    // Only show reply as text if it's an actual string (avoids "[object Object]")
    const replyText = typeof data.reply === "string" && !imageInfo ? data.reply
                     : typeof data.reply === "string" && data.reply.length < 100 ? data.reply
                     : "";

    fillBubble(thinking.querySelector(".bubble"), replyText, null, imageInfo);

    // update the stored copy of that placeholder message too
    const history = getHistory(activeModelAtSend);
    const last = history[history.length - 1];
    if(last && last.role === "assistant"){
      last.text = replyText;
      last.imageInfo = imageInfo;
    }
  } catch(err){
    const errText = "Error: could not reach server.";
    thinking.querySelector(".bubble").textContent = errText;
    const history = getHistory(activeModelAtSend);
    const last = history[history.length - 1];
    if(last && last.role === "assistant") last.text = errText;
  } finally {
    isSending = false;
    if(sendBtn) sendBtn.disabled = false;
  }
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("message").addEventListener("keypress", function(event){
  if(event.key === "Enter"){
    event.preventDefault(); // stop any default form-like behavior just in case
    send();
  }
});
</script>
</body>
</html>
